# Must be unique in a given SonarQube instance
sonar.projectKey=fueleu-platform
# This is the name displayed in the SonarQube UI
sonar.projectName=FuelEU Platform
sonar.projectVersion=1.0

# Path is relative to the sonar-project.properties file. Replace "\" by "/" on Windows.
# Since you have both a frontend and backend directory, include both:
sonar.sources=frontend/src,backend/src

# Exclude test files from being considered as source files
sonar.exclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts,**/*.spec.tsx,**/node_modules/**,**/dist/**

# Encoding of the source code. Default is default system encoding
sonar.sourceEncoding=UTF-8

# (Optional) Tell Sonar where the compiled javascript or typescript lies
# sonar.javascript.lcov.reportPaths=frontend/coverage/lcov.info,backend/coverage/lcov.info
